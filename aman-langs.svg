<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 195" width="330" height="195" role="img" aria-label="DYHARDx Top Languages">
<title>DYHARDx Top Languages</title>
<defs>
<linearGradient id="lgBg" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#1a0a2e"/>
  <stop offset="100%" stop-color="#0d0a1a"/>
</linearGradient>
<filter id="lg"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<rect width="330" height="195" rx="10" fill="url(#lgBg)" stroke="#3b1d6e" stroke-width="1"/>
<text x="165" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#e6edf3" font-family="monospace">Top Languages</text>

<!-- Language bars with animation -->
<!-- JavaScript -->
<text x="20" y="58" font-size="12" fill="#e6edf3" font-family="monospace">JavaScript</text>
<text x="310" y="58" text-anchor="end" font-size="12" fill="#fde047" font-family="monospace">34.2%</text>
<rect x="20" y="63" width="290" height="8" rx="4" fill="#2a1f4d"/>
<rect x="20" y="63" width="0" height="8" rx="4" fill="#fde047">
  <animate attributeName="width" from="0" to="99" dur="1s" begin="0.3s" fill="freeze"/>
</rect>

<!-- Kotlin -->
<text x="20" y="90" font-size="12" fill="#e6edf3" font-family="monospace">Kotlin</text>
<text x="310" y="90" text-anchor="end" font-size="12" fill="#c4b5fd" font-family="monospace">22.1%</text>
<rect x="20" y="95" width="290" height="8" rx="4" fill="#2a1f4d"/>
<rect x="20" y="95" width="0" height="8" rx="4" fill="#8b5cf6">
  <animate attributeName="width" from="0" to="64" dur="1s" begin="0.5s" fill="freeze"/>
</rect>

<!-- Java -->
<text x="20" y="122" font-size="12" fill="#e6edf3" font-family="monospace">Java</text>
<text x="310" y="122" text-anchor="end" font-size="12" fill="#fbbf24" font-family="monospace">18.7%</text>
<rect x="20" y="127" width="290" height="8" rx="4" fill="#2a1f4d"/>
<rect x="20" y="127" width="0" height="8" rx="4" fill="#f87217">
  <animate attributeName="width" from="0" to="54" dur="1s" begin="0.7s" fill="freeze"/>
</rect>

<!-- Python -->
<text x="20" y="154" font-size="12" fill="#e6edf3" font-family="monospace">Python</text>
<text x="310" y="154" text-anchor="end" font-size="12" fill="#86efac" font-family="monospace">14.5%</text>
<rect x="20" y="159" width="290" height="8" rx="4" fill="#2a1f4d"/>
<rect x="20" y="159" width="0" height="8" rx="4" fill="#3b82f6">
  <animate attributeName="width" from="0" to="42" dur="1s" begin="0.9s" fill="freeze"/>
</rect>

<!-- HTML/CSS -->
<text x="20" y="186" font-size="12" fill="#e6edf3" font-family="monospace">HTML/CSS</text>
<text x="310" y="186" text-anchor="end" font-size="12" fill="#f9a8d4" font-family="monospace">10.5%</text>
<rect x="20" y="191" width="290" height="8" rx="4" fill="#2a1f4d"/>
<rect x="20" y="191" width="0" height="8" rx="4" fill="#f43f5e">
  <animate attributeName="width" from="0" to="30" dur="1s" begin="1.1s" fill="freeze"/>
</rect>

</svg>
