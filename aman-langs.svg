<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 282" width="420" height="282" role="img" aria-label="Top languages">
<defs><style><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shineX{0%{transform:translateX(-140px)}60%,100%{transform:translateX(460px)}}
.row{opacity:0;animation:fadeUp .5s ease forwards}
.sh{animation:shineX 4s ease-in-out 2.2s infinite}
]]></style>
<linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"><animate attributeName="stop-color" values="#8A2BE2;#A855F7;#8A2BE2" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#A855F7;#8A2BE2;#A855F7" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="shg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
  <stop offset="50%" stop-color="#fff" stop-opacity=".08"/>
  <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
</linearGradient>
<clipPath id="cardc"><rect x="1" y="1" width="418" height="280" rx="14"/></clipPath>
<!--
  Real language data from GitHub API (DYHARDx):
  HTML: 23 repos  → 44.2%
  JS:   10 repos  → 19.2%
  TS:    8 repos  → 15.4%
  Java:  4 repos  →  7.7%
  CSS:   3 repos  →  5.8%
  Others: 4       →  7.7%
  Total: 52 repos with detected language

  Stacked bar (380px total):
  HTML:  380 * 0.442 = 167.96 → 168px  x=20
  JS:    380 * 0.192 = 72.96  →  73px  x=188
  TS:    380 * 0.154 = 58.52  →  59px  x=261
  Java:  380 * 0.077 = 29.26  →  29px  x=320
  CSS:   380 * 0.058 = 22.04  →  22px  x=349
-->
<clipPath id="stackc"><rect x="20" y="58" width="0" height="11" rx="5.5"><animate attributeName="width" from="0" to="380" dur="1.4s" begin=".4s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/></rect></clipPath>
</defs>

<rect x="1" y="1" width="418" height="280" rx="14" fill="#120b23" stroke="url(#tg)" stroke-width="1.5"/>
<text x="20" y="34" font-size="16" font-weight="bold" fill="url(#tg)">📊 Top Languages</text>

<!-- Stacked bar -->
<g clip-path="url(#stackc)">
  <rect x="20"  y="58" width="168" height="11" fill="#f97316"/><!-- HTML  44.2% -->
  <rect x="188" y="58" width="73"  height="11" fill="#fde047"/><!-- JS    19.2% -->
  <rect x="261" y="58" width="59"  height="11" fill="#7db8ff"/><!-- TS    15.4% -->
  <rect x="320" y="58" width="29"  height="11" fill="#f87217"/><!-- Java   7.7% -->
  <rect x="349" y="58" width="22"  height="11" fill="#c084fc"/><!-- CSS    5.8% -->
</g>

  <!-- Row 1: HTML 44.2% -->
  <g class="row" style="animation-delay:0.90s">
    <circle cx="26" cy="91" r="5" fill="#f97316"/>
    <text x="40" y="96" font-size="13" fill="#e6edf3" font-weight="bold">HTML</text>
    <text x="396" y="96" text-anchor="end" font-size="13" fill="#f97316" font-weight="bold">44.2%</text>
    <rect x="40" y="104" width="268" height="9" rx="4.5" fill="#241740"/>
    <rect x="40" y="104" width="0" height="9" rx="4.5" fill="#f97316" style="animation-delay:1.05s">
      <animate attributeName="width" from="0" to="167" dur="1.1s" begin="1.05s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>

  <!-- Row 2: JavaScript 19.2% -->
  <g class="row" style="animation-delay:1.25s">
    <circle cx="26" cy="133" r="5" fill="#fde047"/>
    <text x="40" y="138" font-size="13" fill="#e6edf3" font-weight="bold">JavaScript</text>
    <text x="396" y="138" text-anchor="end" font-size="13" fill="#fde047" font-weight="bold">19.2%</text>
    <rect x="40" y="146" width="268" height="9" rx="4.5" fill="#241740"/>
    <rect x="40" y="146" width="0" height="9" rx="4.5" fill="#fde047" style="animation-delay:1.40s">
      <animate attributeName="width" from="0" to="72" dur="1.1s" begin="1.40s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>

  <!-- Row 3: TypeScript 15.4% -->
  <g class="row" style="animation-delay:1.60s">
    <circle cx="26" cy="175" r="5" fill="#7db8ff"/>
    <text x="40" y="180" font-size="13" fill="#e6edf3" font-weight="bold">TypeScript</text>
    <text x="396" y="180" text-anchor="end" font-size="13" fill="#7db8ff" font-weight="bold">15.4%</text>
    <rect x="40" y="188" width="268" height="9" rx="4.5" fill="#241740"/>
    <rect x="40" y="188" width="0" height="9" rx="4.5" fill="#7db8ff" style="animation-delay:1.75s">
      <animate attributeName="width" from="0" to="57" dur="1.1s" begin="1.75s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>

  <!-- Row 4: Java 7.7% -->
  <g class="row" style="animation-delay:1.95s">
    <circle cx="26" cy="217" r="5" fill="#f87217"/>
    <text x="40" y="222" font-size="13" fill="#e6edf3" font-weight="bold">Java</text>
    <text x="396" y="222" text-anchor="end" font-size="13" fill="#f87217" font-weight="bold">7.7%</text>
    <rect x="40" y="230" width="268" height="9" rx="4.5" fill="#241740"/>
    <rect x="40" y="230" width="0" height="9" rx="4.5" fill="#f87217" style="animation-delay:2.10s">
      <animate attributeName="width" from="0" to="29" dur="1.1s" begin="2.10s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>

  <!-- Row 5: CSS 5.8% -->
  <g class="row" style="animation-delay:2.30s">
    <circle cx="26" cy="259" r="5" fill="#c084fc"/>
    <text x="40" y="264" font-size="13" fill="#e6edf3" font-weight="bold">CSS</text>
    <text x="396" y="264" text-anchor="end" font-size="13" fill="#c084fc" font-weight="bold">5.8%</text>
    <rect x="40" y="272" width="268" height="9" rx="4.5" fill="#241740"/>
    <rect x="40" y="272" width="0" height="9" rx="4.5" fill="#c084fc" style="animation-delay:2.45s">
      <animate attributeName="width" from="0" to="22" dur="1.1s" begin="2.45s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>

<g clip-path="url(#cardc)"><rect class="sh" x="0" y="0" width="100" height="282" fill="url(#shg)" transform="skewX(-15)"/></g>
</svg>
