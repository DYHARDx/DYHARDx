<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 510" width="330" height="510" role="img" aria-label="DYHARDx ID Card">
<title>Aman Singh — DYHARDx ID Card</title>
<defs>
<style><![CDATA[
@keyframes swing{
  0%{transform-origin:50% 0%;transform:rotate(-4deg)}
  50%{transform-origin:50% 0%;transform:rotate(4deg)}
  100%{transform-origin:50% 0%;transform:rotate(-4deg)}
}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{stop-opacity:.4}50%{stop-opacity:1}100%{stop-opacity:.4}}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:1;transform:scale(1)}}
.card-swing{transform-origin:50% 0%;animation:swing 4s ease-in-out infinite}
.tw{transform-box:fill-box;transform-origin:center;animation:twinkle 2.8s ease-in-out infinite}
.np{animation:pulse 2.4s ease-in-out infinite}
]]></style>

<!-- Card gradient -->
<linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#1a0a2e"/>
  <stop offset="50%" stop-color="#120b23"/>
  <stop offset="100%" stop-color="#0d0a1a"/>
</linearGradient>
<linearGradient id="cardBorder" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%"><animate attributeName="stop-color" values="#8A2BE2;#A855F7;#C084FC;#8A2BE2" dur="5s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#C084FC;#8A2BE2;#A855F7;#C084FC" dur="5s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="headerBg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#6B21A8"/>
  <stop offset="100%" stop-color="#4C1D95"/>
</linearGradient>
<linearGradient id="avatarBg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#8A2BE2"/>
  <stop offset="100%" stop-color="#4C1D95"/>
</linearGradient>
<linearGradient id="badgeBg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#1a0a2e"/>
  <stop offset="100%" stop-color="#150d2a"/>
</linearGradient>
<linearGradient id="lanyardColor" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#6B21A8"/>
  <stop offset="50%" stop-color="#8A2BE2"/>
  <stop offset="100%" stop-color="#6B21A8"/>
</linearGradient>
<radialGradient id="avatarGlow">
  <stop offset="0%" stop-color="#A855F7" stop-opacity=".3"/>
  <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
</radialGradient>

<filter id="cardShadow">
  <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#8A2BE2" flood-opacity=".35"/>
</filter>
<filter id="glow">
  <feGaussianBlur stdDeviation="2.5" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="glowBig">
  <feGaussianBlur stdDeviation="5" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<pattern id="cardDots" width="18" height="18" patternUnits="userSpaceOnUse">
  <circle cx="9" cy="9" r=".5" fill="rgba(168,85,247,.15)"/>
</pattern>
<clipPath id="avatarClip"><circle cx="165" cy="167" r="55"/></clipPath>
</defs>

<!-- Lanyard cord -->
<g>
  <!-- Clip hook at top -->
  <rect x="154" y="0" width="22" height="12" rx="3" fill="#3b1d6e"/>
  <rect x="158" y="6" width="14" height="8" rx="2" fill="#6B21A8"/>

  <!-- Left cord -->
  <path d="M 160 10 Q 110 55 95 115 Q 80 165 100 190" stroke="url(#lanyardColor)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Right cord -->
  <path d="M 170 10 Q 220 55 235 115 Q 250 165 230 190" stroke="url(#lanyardColor)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- NSOC Logo on lanyard -->
  <circle cx="165" cy="62" r="14" fill="#1a0a2e" stroke="#8A2BE2" stroke-width="1.5"/>
  <text x="165" y="66" text-anchor="middle" font-size="9" fill="#A855F7" font-weight="bold" font-family="monospace">NSOC</text>
</g>

<!-- Card (swinging) -->
<g class="card-swing">
  <!-- Card shadow -->
  <rect x="20" y="172" width="290" height="330" rx="18" fill="#000000" fill-opacity=".4" filter="url(#cardShadow)"/>

  <!-- Card main body -->
  <rect x="18" y="168" width="294" height="334" rx="18" fill="url(#cardBg)"/>
  <rect x="18" y="168" width="294" height="334" rx="18" fill="url(#cardDots)"/>
  <!-- Card border (animated) -->
  <rect x="18" y="168" width="294" height="334" rx="18" fill="none" stroke="url(#cardBorder)" stroke-width="2"/>

  <!-- Header band -->
  <rect x="18" y="168" width="294" height="80" rx="18" fill="url(#headerBg)"/>
  <rect x="18" y="220" width="294" height="28" fill="url(#headerBg)"/>

  <!-- Header text -->
  <text x="165" y="198" text-anchor="middle" font-size="11" fill="rgba(255,255,255,.6)" font-family="monospace" letter-spacing="3">DEVELOPER · ID CARD</text>
  <text x="165" y="218" text-anchor="middle" font-size="12" fill="rgba(255,255,255,.45)" font-family="monospace" letter-spacing="2">OPEN SOURCE</text>

  <!-- Avatar circle -->
  <circle cx="165" cy="294" r="60" fill="url(#avatarGlow)" filter="url(#glowBig)"/>
  <circle cx="165" cy="284" r="57" fill="#0d0a1a" stroke="url(#cardBorder)" stroke-width="2.5"/>
  <!-- Avatar - stylized code bracket avatar -->
  <text x="165" y="258" text-anchor="middle" font-size="14" fill="#4b5563" font-family="monospace">/**/</text>
  <text x="165" y="278" text-anchor="middle" font-size="42" fill="url(#avatarBg)" font-family="monospace" filter="url(#glow)">A</text>
  <text x="165" y="303" text-anchor="middle" font-size="13" fill="#A855F7" font-family="monospace">@DYHARDx</text>

  <!-- Name -->
  <text x="165" y="328" text-anchor="middle" font-size="20" font-weight="bold" fill="#e6edf3" font-family="monospace" filter="url(#glow)">Aman Singh</text>

  <!-- Role -->
  <text x="165" y="350" text-anchor="middle" font-size="13" fill="#A855F7" font-family="monospace">Open Source Developer</text>

  <!-- Divider -->
  <line x1="45" y1="362" x2="285" y2="362" stroke="#3b1d6e" stroke-width="1"/>

  <!-- Stats row -->
  <rect x="30" y="370" width="270" height="52" rx="10" fill="url(#badgeBg)" stroke="#3b1d6e" stroke-width="1"/>
  <text x="80" y="389" text-anchor="middle" font-size="10" fill="#6b7280" font-family="monospace">REPOS</text>
  <text x="165" y="389" text-anchor="middle" font-size="10" fill="#6b7280" font-family="monospace">COMMITS</text>
  <text x="250" y="389" text-anchor="middle" font-size="10" fill="#6b7280" font-family="monospace">STARS</text>
  <line x1="122" y1="374" x2="122" y2="418" stroke="#3b1d6e" stroke-width="1"/>
  <line x1="208" y1="374" x2="208" y2="418" stroke="#3b1d6e" stroke-width="1"/>
  <text x="80" y="410" text-anchor="middle" font-size="16" font-weight="bold" fill="#8A2BE2" font-family="monospace" filter="url(#glow)">40+</text>
  <text x="165" y="410" text-anchor="middle" font-size="16" font-weight="bold" fill="#A855F7" font-family="monospace" filter="url(#glow)">1K+</text>
  <text x="250" y="410" text-anchor="middle" font-size="16" font-weight="bold" fill="#fde047" font-family="monospace" filter="url(#glow)">100+</text>

  <!-- Achievement badges -->
  <rect x="30" y="432" width="270" height="28" rx="8" fill="#1a0a2e" stroke="#8A2BE2" stroke-width="1"/>
  <text x="165" y="450" text-anchor="middle" font-size="12" fill="#A855F7" font-weight="bold" font-family="monospace">🏆 Code Social Rank 1</text>

  <rect x="30" y="466" width="270" height="28" rx="8" fill="#1a0a2e" stroke="#6B21A8" stroke-width="1"/>
  <text x="165" y="484" text-anchor="middle" font-size="12" fill="#C084FC" font-weight="bold" font-family="monospace">🥉 GSSoC'25 Rank 3</text>

  <!-- Bottom barcode/ID line -->
  <text x="165" y="500" text-anchor="middle" font-size="9" fill="#3b1d6e" font-family="monospace" letter-spacing="2">⬛⬜⬛⬛⬜⬛⬜⬜⬛⬛⬜⬛⬜⬛</text>
</g>

<!-- Sparkles -->
<g class="tw" style="animation-delay:.6s"><path d="M 18 168 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2z" fill="#C084FC" filter="url(#glow)"/></g>
<g class="tw" style="animation-delay:1.8s"><path d="M 312 168 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2z" fill="#8A2BE2" filter="url(#glow)"/></g>
<g class="tw" style="animation-delay:3s"><path d="M 30 490 l1.5 4 4 1.5 -4 1.5 -1.5 4 -1.5 -4 -4 -1.5 4 -1.5z" fill="#A855F7" filter="url(#glow)"/></g>

</svg>
