<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 660" width="420" height="660" role="img" aria-label="Aman Singh ID card lanyard">
<title>Aman Singh â€” swinging ID badge</title>
<defs>
<style type="text/css"><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes settle{0%{transform:rotate(0deg) translateY(-660px)}18%{transform:rotate(0deg) translateY(0)}30%{transform:rotate(13deg)}46%{transform:rotate(-9deg)}62%{transform:rotate(6deg)}78%{transform:rotate(-3.5deg)}92%{transform:rotate(1.5deg)}100%{transform:rotate(0deg)}}
@keyframes sway{0%,100%{transform:rotate(-3.2deg)}50%{transform:rotate(3.2deg)}}
@keyframes cardWobble{0%,100%{transform:rotate(1.6deg)}50%{transform:rotate(-1.6deg)}}
@keyframes shine{0%{transform:translateX(-340px) skewX(-18deg)}55%,100%{transform:translateX(420px) skewX(-18deg)}}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:1;transform:scale(1)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}12%{transform:scale(1.25)}24%{transform:scale(1)}36%{transform:scale(1.15)}48%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.settle{transform-origin:210px 6px;animation:settle 3.4s cubic-bezier(.34,1.1,.5,1) forwards}
.sway{transform-origin:210px 6px;animation:sway 4.2s ease-in-out 3.4s infinite}
.wob{transform-origin:210px 300px;animation:cardWobble 4.2s ease-in-out 3.4s infinite}
.shine{animation:shine 4.5s ease-in-out 3.6s infinite}
.tw{transform-box:fill-box;transform-origin:center;animation:twinkle 2.8s ease-in-out infinite}
.hb{transform-box:fill-box;transform-origin:center;animation:heartBeat 2.4s ease-in-out infinite}
.np{animation:pulse 2.6s ease-in-out infinite}
]]></style>

<!-- Strap gradient â€” purple theme -->
<linearGradient id="strapg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#4C1D95"/><stop offset="50%" stop-color="#8A2BE2"/><stop offset="100%" stop-color="#4C1D95"/>
</linearGradient>
<!-- Card background -->
<linearGradient id="cardg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#1a0a2e"/><stop offset="100%" stop-color="#0d0a1a"/>
</linearGradient>
<!-- Animated card border -->
<linearGradient id="cardborder" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%"><animate attributeName="stop-color" values="#8A2BE2;#A855F7;#C084FC;#8A2BE2" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#C084FC;#8A2BE2;#A855F7;#C084FC" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<!-- Metal clasp gradient -->
<linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#c8ccd6"/><stop offset="45%" stop-color="#8a90a0"/><stop offset="55%" stop-color="#6a7080"/><stop offset="100%" stop-color="#9aa0b0"/>
</linearGradient>
<!-- Holo shine sweep -->
<linearGradient id="shineg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity=".14"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/>
</linearGradient>
<!-- Name gradient -->
<linearGradient id="nameg2" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"><animate attributeName="stop-color" values="#8A2BE2;#A855F7;#8A2BE2" dur="5s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#A855F7;#8A2BE2;#A855F7" dur="5s" repeatCount="indefinite"/></stop>
</linearGradient>
<!-- Avatar gradient -->
<linearGradient id="avatargrad" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#6B21A8"/><stop offset="100%" stop-color="#4C1D95"/>
</linearGradient>
<radialGradient id="lglow"><stop offset="0%" stop-color="#8A2BE2" stop-opacity=".18"/><stop offset="100%" stop-color="#8A2BE2" stop-opacity="0"/></radialGradient>

<filter id="glow2"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#8A2BE2" flood-opacity=".4"/></filter>
<clipPath id="cardclip"><rect x="82" y="298" width="256" height="330" rx="20"/></clipPath>
<clipPath id="avatarclip"><circle cx="210" cy="412" r="57"/></clipPath>
</defs>

<!-- Ambient glow -->
<circle cx="210" cy="440" r="230" fill="url(#lglow)"><animate attributeName="r" values="230;252;230" dur="5s" repeatCount="indefinite"/></circle>

<!-- Sparkles -->
<g class="tw" style="animation-delay:.5s"><path d="M60 200l3 8 8 3-8 3-3 8-3-8-8-3 8-3z" fill="#C084FC"/></g>
<g class="tw" style="animation-delay:1.6s"><path d="M372 300l2.4 6.4 6.4 2.4-6.4 2.4-2.4 6.4-2.4-6.4-6.4-2.4 6.4-2.4z" fill="#8A2BE2"/></g>
<g class="tw" style="animation-delay:2.7s"><path d="M52 480l2.4 6.4 6.4 2.4-6.4 2.4-2.4 6.4-2.4-6.4-6.4-2.4 6.4-2.4z" fill="#A855F7"/></g>
<!-- Pulsing heart -->
<g class="hb" style="animation-delay:1s"><path d="M368 480 c-4-9-17-7-17 3 0 7 10 13 17 18 7-5 17-11 17-18 0-10-13-12-17-3z" fill="#8A2BE2" opacity=".8" filter="url(#glow2)"/></g>

<!-- Pendulum: settle then sway -->
<g class="settle"><g class="sway">

  <!-- Strap -->
  <g>
    <path d="M191 -6 L229 -6 L226 236 L194 236 Z" fill="url(#strapg)"/>
    <line x1="196" y1="0" x2="198.5" y2="234" stroke="#fff" stroke-opacity=".55" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="224" y1="0" x2="221.5" y2="234" stroke="#fff" stroke-opacity=".55" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="0" y="0" font-size="10.5" font-weight="bold" fill="#fff" opacity=".92" letter-spacing="2" transform="translate(214,18) rotate(90)">AMAN.DEV â™¥ CODE â™¥ AMAN.DEV</text>
  </g>

  <!-- Clasp + ring -->
  <rect x="188" y="232" width="44" height="26" rx="6" fill="url(#metal)" stroke="#4a4f5c" stroke-width="1"/>
  <rect x="199" y="238" width="22" height="7" rx="3.5" fill="#3c414e"/>
  <circle cx="210" cy="272" r="14" fill="none" stroke="url(#metal)" stroke-width="5.5"/>

  <!-- Card (secondary wobble) -->
  <g class="wob">
    <rect x="82" y="298" width="256" height="330" rx="20" fill="url(#cardg)" stroke="url(#cardborder)" stroke-width="2" filter="url(#cardShadow)"/>

    <!-- Slot at top of card -->
    <rect x="180" y="310" width="60" height="10" rx="5" fill="#050310" stroke="#3b1d6e" stroke-width="1"/>

    <g clip-path="url(#cardclip)">
      <!-- Header band -->
      <rect x="82" y="298" width="256" height="34" fill="#231541" opacity=".8"/>
      <text x="98" y="320" font-size="9" fill="#9aa4b2" letter-spacing="1.5">DEVELOPER ID</text>
      <text x="322" y="320" text-anchor="end" font-size="9" fill="#A855F7" letter-spacing="1.5">AS-0001</text>
      <text x="98" y="332" font-size="8" fill="#6b7280" letter-spacing="1">NEXUS SPRING OF CODE</text>

      <!-- Avatar circle with stylized "A" -->
      <circle cx="210" cy="412" r="59" fill="#0d0a1a"/>
      <circle cx="210" cy="412" r="59" fill="none" stroke="url(#cardborder)" stroke-width="2.5"/>

      <!-- Avatar image -->
      <image x="151" y="353" width="118" height="118" href="data:image/jpeg;base64," clip-path="url(#avatarclip)" />
