<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 495 195" width="495" height="195" role="img" aria-label="DYHARDx GitHub Stats">
<title>DYHARDx GitHub Stats</title>
<defs>
<style><![CDATA[
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes growBar{from{width:0}to{width:var(--w)}}
]]></style>
<linearGradient id="sgBg" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#1a0a2e"/>
  <stop offset="100%" stop-color="#0d0a1a"/>
</linearGradient>
<linearGradient id="rankCircle" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#8A2BE2"/>
  <stop offset="100%" stop-color="#A855F7"/>
</linearGradient>
<filter id="sg"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<!-- Card -->
<rect width="495" height="195" rx="10" fill="url(#sgBg)" stroke="#3b1d6e" stroke-width="1"/>

<!-- Title -->
<text x="248" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#e6edf3" font-family="monospace">DYHARDx's GitHub Stats</text>

<!-- Rank circle -->
<circle cx="68" cy="110" r="42" fill="none" stroke="#3b1d6e" stroke-width="5"/>
<circle cx="68" cy="110" r="42" fill="none" stroke="url(#rankCircle)" stroke-width="5"
  stroke-dasharray="175" stroke-dashoffset="44" stroke-linecap="round" transform="rotate(-90 68 110)">
  <animate attributeName="stroke-dashoffset" from="219" to="44" dur="1.5s" fill="freeze" begin="0.3s"/>
</circle>
<text x="68" y="105" text-anchor="middle" font-size="14" fill="#9aa4b2" font-family="monospace">Rank</text>
<text x="68" y="122" text-anchor="middle" font-size="18" font-weight="bold" fill="#A855F7" font-family="monospace" filter="url(#sg)">A+</text>

<!-- Stats -->
<!-- Stars -->
<text x="145" y="68" font-size="13" fill="#e6edf3" font-family="monospace" style="animation:fadeIn .4s ease .5s both">⭐ Total Stars Earned:</text>
<text x="430" y="68" text-anchor="end" font-size="13" font-weight="bold" fill="#fde047" font-family="monospace" style="animation:fadeIn .4s ease .6s both">100</text>

<!-- Total Commits -->
<text x="145" y="96" font-size="13" fill="#e6edf3" font-family="monospace" style="animation:fadeIn .4s ease .7s both">💻 Total Commits (2025):</text>
<text x="430" y="96" text-anchor="end" font-size="13" font-weight="bold" fill="#A855F7" font-family="monospace" style="animation:fadeIn .4s ease .8s both">1000+</text>

<!-- PRs -->
<text x="145" y="124" font-size="13" fill="#e6edf3" font-family="monospace" style="animation:fadeIn .4s ease .9s both">🔀 Total PRs:</text>
<text x="430" y="124" text-anchor="end" font-size="13" font-weight="bold" fill="#4ade80" font-family="monospace" style="animation:fadeIn .4s ease 1.0s both">150+</text>

<!-- Issues -->
<text x="145" y="152" font-size="13" fill="#e6edf3" font-family="monospace" style="animation:fadeIn .4s ease 1.1s both">🐛 Total Issues:</text>
<text x="430" y="152" text-anchor="end" font-size="13" font-weight="bold" fill="#f87171" font-family="monospace" style="animation:fadeIn .4s ease 1.2s both">80+</text>

<!-- Contributed to -->
<text x="145" y="180" font-size="13" fill="#e6edf3" font-family="monospace" style="animation:fadeIn .4s ease 1.3s both">📂 Contributed to (last year):</text>
<text x="430" y="180" text-anchor="end" font-size="13" font-weight="bold" fill="#C084FC" font-family="monospace" style="animation:fadeIn .4s ease 1.4s both">30+</text>

</svg>
