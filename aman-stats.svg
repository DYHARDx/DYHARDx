<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 495 195" width="495" height="195" role="img" aria-label="DYHARDx GitHub Stats">
<title>DYHARDx GitHub Stats</title>
<defs><style><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes rankGlow{0%,100%{opacity:.75}50%{opacity:1}}
@keyframes shineX{0%{transform:translateX(-200px)}60%,100%{transform:translateX(560px)}}
@keyframes circleAnim{from{stroke-dashoffset:219}to{stroke-dashoffset:55}}
.row{opacity:0;animation:fadeUp .45s ease forwards}
.rk{animation:rankGlow 2.2s ease-in-out infinite}
.sh{animation:shineX 4s ease-in-out 2.2s infinite}
]]></style>
<linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"><animate attributeName="stop-color" values="#8A2BE2;#A855F7;#8A2BE2" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#A855F7;#8A2BE2;#A855F7" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="rankCircle" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#8A2BE2"/>
  <stop offset="100%" stop-color="#A855F7"/>
</linearGradient>
<linearGradient id="shg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
  <stop offset="50%" stop-color="#fff" stop-opacity=".07"/>
  <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
</linearGradient>
<clipPath id="cardc"><rect x="1" y="1" width="493" height="193" rx="14"/></clipPath>
</defs>

<!-- Card -->
<rect x="1" y="1" width="493" height="193" rx="14" fill="#120b23" stroke="url(#sg)" stroke-width="1.5"/>

<!-- Title -->
<text x="248" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="url(#sg)">DYHARDx's GitHub Stats</text>

<!-- Rank circle (left side) -->
<!-- Track -->
<circle cx="70" cy="112" r="42" fill="none" stroke="#241740" stroke-width="5"/>
<!-- Progress — B+ rank based on 82 repos, 20 stars, 20 followers -->
<circle cx="70" cy="112" r="42" fill="none" stroke="url(#rankCircle)" stroke-width="5"
  stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round"
  transform="rotate(-90 70 112)">
  <animate attributeName="stroke-dashoffset" from="264" to="66" dur="1.5s" begin="0.3s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
</circle>
<text x="70" y="107" text-anchor="middle" font-size="13" fill="#9aa4b2">Rank</text>
<text class="rk" x="70" y="126" text-anchor="middle" font-size="20" font-weight="bold" fill="#A855F7">B+</text>

<!-- Stats rows (right side) -->

<!-- Total Stars: 20 (from API) -->
<g class="row" style="animation-delay:0.55s">
  <text x="148" y="68" font-size="13" fill="#e6edf3">⭐ Total Stars Earned:</text>
  <text x="478" y="68" text-anchor="end" font-size="13" font-weight="bold" fill="#fde047">20</text>
</g>

<!-- Total Commits (estimated from activity) -->
<g class="row" style="animation-delay:0.75s">
  <text x="148" y="96" font-size="13" fill="#e6edf3">💻 Total Commits (2025):</text>
  <text x="478" y="96" text-anchor="end" font-size="13" font-weight="bold" fill="#A855F7">500+</text>
</g>

<!-- Public Repos: 82 (from API) -->
<g class="row" style="animation-delay:0.95s">
  <text x="148" y="124" font-size="13" fill="#e6edf3">📦 Public Repos:</text>
  <text x="478" y="124" text-anchor="end" font-size="13" font-weight="bold" fill="#4ade80">82</text>
</g>

<!-- Followers: 20 (from API) -->
<g class="row" style="animation-delay:1.15s">
  <text x="148" y="152" font-size="13" fill="#e6edf3">👥 Followers:</text>
  <text x="478" y="152" text-anchor="end" font-size="13" font-weight="bold" fill="#C084FC">20</text>
</g>

<!-- Following: 2 (from API) -->
<g class="row" style="animation-delay:1.35s">
  <text x="148" y="180" font-size="13" fill="#e6edf3">🌐 Following:</text>
  <text x="478" y="180" text-anchor="end" font-size="13" font-weight="bold" fill="#7db8ff">2</text>
</g>

<g clip-path="url(#cardc)"><rect class="sh" x="0" y="0" width="120" height="195" fill="url(#shg)" transform="skewX(-15)"/></g>
</svg>
